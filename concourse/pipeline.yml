---
resources:
  - name: repo
    type: git
    icon: github
    source:
      uri: ((repo_uri))
      branch: ((repo_branch))

  - name: tagged-release-repo
    type: git
    icon: github
    source:
      uri: ((repo_uri))
      tag_filter: ((release_tag_filter))

  - name: rust-ci-image
    type: registry-image
    icon: docker
    source:
      repository: ((ci_image_repository))
      tag: ((ci_image_tag))
      username: ((docker_username))
      password: ((docker_password))

jobs:
  - name: build-rust-ci-image
    public: true
    plan:
      - get: repo
        trigger: true
      - put: rust-ci-image
        params:
          build: repo/concourse
          dockerfile: concourse/Dockerfile
          tag: ((ci_image_tag))

  - name: check
    public: true
    plan:
      - get: repo
        trigger: true
      - get: rust-ci-image
      - task: cargo-check
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ((ci_image_repository))
              tag: ((ci_image_tag))
          inputs:
            - name: repo
          run:
            path: bash
            args:
              - -euc
              - |
                  cd repo
                  rustup toolchain install stable
                  rustup default stable
                  cargo check

  - name: test-stable
    public: true
    plan:
      - get: repo
        trigger: true
      - get: rust-ci-image
      - task: cargo-test-stable
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ((ci_image_repository))
              tag: ((ci_image_tag))
          inputs:
            - name: repo
          run:
            path: bash
            args:
              - -euc
              - |
                  cd repo
                  rustup toolchain install stable
                  rustup default stable
                  cargo -V
                  cargo test --workspace
                  cargo test --workspace --all-features
                  cargo test --workspace --no-default-features

  - name: test-beta
    public: true
    plan:
      - get: repo
        trigger: true
      - get: rust-ci-image
      - task: cargo-test-beta
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ((ci_image_repository))
              tag: ((ci_image_tag))
          inputs:
            - name: repo
          run:
            path: bash
            args:
              - -euc
              - |
                  cd repo
                  rustup toolchain install beta
                  rustup default beta
                  cargo -V
                  cargo test --workspace
                  cargo test --workspace --all-features
                  cargo test --workspace --no-default-features

  - name: coverage
    public: true
    plan:
      - get: repo
        trigger: true
      - get: rust-ci-image
      - task: cargo-tarpaulin
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ((ci_image_repository))
              tag: ((ci_image_tag))
          inputs:
            - name: repo
          outputs:
            - name: coverage-report
          run:
            path: bash
            args:
              - -euc
              - |
                  cd repo
                  set +e

                  rustup toolchain install stable
                  rustup default stable
                  cargo install cargo-tarpaulin --locked
                  cargo tarpaulin --workspace --all-features --skip-clean --out Json --output-dir /tmp/cargo-reports || true

                  python3 <<'PY'
                  import json
                  from pathlib import Path

                  report = Path('/tmp/cargo-reports/tarpaulin-report.json')
                  if report.exists():
                      summary = json.loads(report.read_text())
                      covered = summary.get('covered', 0) or 0
                      coverable = summary.get('coverable', 0) or 0
                      pct = summary.get('percent')
                      if pct is None:
                          pct = (covered / coverable * 100.0) if coverable else 0.0
                      status = 'Report generated'
                  else:
                      covered = coverable = 0
                      pct = 0.0
                      status = 'Coverage run failed'

                  Path('/tmp/cargo-reports/coverage-comment.md').write_text(
                      f"""## Coverage Report

- **Status:** {status}
- **Total coverage:** {pct:.2f}%
- **Covered lines:** {covered}
- **Coverable lines:** {coverable}
- **Tool:** `cargo tarpaulin`

> In GitHub Actions this job was `continue-on-error`, so it is intentionally non-blocking in Concourse too.
"""
                  )
                  PY

                  mkdir -p ../coverage-report
                  cp -r /tmp/cargo-reports/. ../coverage-report/
                  printf 'Generated by Concourse CI mirror.\n' > ../coverage-report/README.md
                  exit 0

  - name: lint
    public: true
    plan:
      - get: repo
        trigger: true
      - get: rust-ci-image
      - task: rustfmt-clippy
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ((ci_image_repository))
              tag: ((ci_image_tag))
          inputs:
            - name: repo
          run:
            path: bash
            args:
              - -euc
              - |
                  cd repo
                  rustup toolchain install stable
                  rustup default stable
                  rustup component add rustfmt clippy
                  cargo fmt --all -- --check
                  cargo clippy --all-targets --all-features -- -D warnings

  - name: security
    public: true
    plan:
      - get: repo
        trigger: true
      - get: rust-ci-image
      - task: audit-deny
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ((ci_image_repository))
              tag: ((ci_image_tag))
          inputs:
            - name: repo
          run:
            path: bash
            args:
              - -euc
              - |
                  cd repo
                  rustup toolchain install stable
                  rustup default stable
                  cargo install cargo-audit --locked
                  cargo install cargo-deny --locked
                  cargo audit
                  cargo deny check all

  - name: release-linux-and-sbom
    public: true
    plan:
      - get: tagged-release-repo
        trigger: true
      - get: rust-ci-image
      - task: build-release-artifacts
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: ((ci_image_repository))
              tag: ((ci_image_tag))
          inputs:
            - name: tagged-release-repo
          outputs:
            - name: release-artifacts
          run:
            path: bash
            args:
              - -euc
              - |
                  cd tagged-release-repo
                  tag="$(git tag --points-at "$(git rev-parse HEAD)" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
                  if [ -z "$tag" ]; then
                    echo "No release tag on this commit; skipping." > ../release-artifacts/INFO.txt
                    echo "INFO" >> ../release-artifacts/INFO.txt
                    exit 0
                  fi

                  rustup toolchain install stable
                  rustup default stable
                  rustup target add x86_64-unknown-linux-gnu
                  rustup target add x86_64-unknown-linux-musl
                  rustup target add aarch64-unknown-linux-gnu
                  cargo install cross --git https://github.com/cross-rs/cross

                  binary_name="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["name"])')"

                  for target in x86_64-unknown-linux-gnu x86_64-unknown-linux-musl aarch64-unknown-linux-gnu; do
                    if [ "$target" = "x86_64-unknown-linux-gnu" ]; then
                      cargo build --release --target "$target"
                    else
                      cross build --release --target "$target"
                    fi

                    mkdir -p ../release-artifacts/dist
                    cp "target/$target/release/$binary_name" "../release-artifacts/dist/$binary_name-$target"
                    tar -czf "../release-artifacts/$binary_name-$target.tar.gz" -C "../release-artifacts/dist" "$binary_name-$target"
                    rm -f "../release-artifacts/dist/$binary_name-$target"
                  done

                  rm -rf ../release-artifacts/dist

                  cargo install cargo-sbom --locked
                  cargo sbom --output-format cyclone_dx_json_1_4 > ../release-artifacts/sbom.cdx.json
                  cargo sbom --output-format spdx_json_2_3 > ../release-artifacts/sbom.spdx.json
                  cd ../release-artifacts
                  sha256sum *.tar.gz sbom.cdx.json sbom.spdx.json > SHA256SUMS.txt
                  printf '%s\n' "$tag" > RELEASE_TAG.txt

groups:
  - name: CI
    jobs:
      - build-rust-ci-image
      - check
      - test-stable
      - test-beta
      - coverage
      - lint
      - security
  - name: Release
    jobs:
      - release-linux-and-sbom
